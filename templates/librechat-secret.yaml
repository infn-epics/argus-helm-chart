{{/*
Single Secret carrying every env var the LibreChat process needs: the
required JWT/CREDS/MEILI keys (auto-generated once, then preserved across
upgrades — see the argus.secretValue helper), the auth.mode-dependent
toggles (this has to be a Secret rather than the upstream chart's
`configEnv` ConfigMap map precisely because those toggles depend on
`auth.mode` and only a template WE render can express that conditional —
see values.yaml's top-of-file note), and every operator-supplied value
under `secrets.data` (LLM API keys, ARGUS backend credentials, MCP server
tokens, ...). Wired in via `librechat.global.librechat.existingSecretName`
and `librechat.meilisearch.auth.existingMasterKeySecret` (both fixed to
resourceNames.credentialsSecret).

Rendered whenever LibreChat OR ARGUS MCP is enabled, not just LibreChat:
argus-mcp/deployment.yaml's own secretKeyRefs (backend credentials —
ChannelFinder password, ArgoCD token, Logbook password, ...) point at
this same Secret, so "ARGUS MCP only" mode (librechat.enabled: false)
still needs it to exist. The LibreChat-specific keys below (JWT/CREDS/
MEILI/auth toggles) just sit unused in that mode.
*/}}
{{- if and (or .Values.librechat.enabled .Values.argusMcp.enabled) .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.resourceNames.credentialsSecret }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ include "argus.secretValue" (list $ "JWT_SECRET" (randAlphaNum 64)) | quote }}
  JWT_REFRESH_SECRET: {{ include "argus.secretValue" (list $ "JWT_REFRESH_SECRET" (randAlphaNum 64)) | quote }}
  CREDS_KEY: {{ include "argus.secretValue" (list $ "CREDS_KEY" (randAlphaNum 32 | sha256sum)) | quote }}
  CREDS_IV: {{ include "argus.secretValue" (list $ "CREDS_IV" ((randAlphaNum 32 | sha256sum) | trunc 32)) | quote }}
  MEILI_MASTER_KEY: {{ include "argus.secretValue" (list $ "MEILI_MASTER_KEY" (randAlphaNum 32)) | quote }}

  {{- if or (eq .Values.auth.mode "basic") (eq .Values.auth.mode "both") }}
  ALLOW_EMAIL_LOGIN: "true"
  ALLOW_REGISTRATION: {{ .Values.auth.basic.allowRegistration | quote }}
  ALLOW_PASSWORD_RESET: {{ .Values.auth.basic.allowPasswordReset | quote }}
  ALLOW_UNVERIFIED_EMAIL_LOGIN: {{ .Values.auth.basic.allowUnverifiedEmailLogin | quote }}
  {{- else }}
  # oauth2-only: no other explicit "hide the local login form" switch
  # exists upstream, so disabling email login is how it's done.
  ALLOW_EMAIL_LOGIN: "false"
  ALLOW_REGISTRATION: "false"
  {{- end }}

  {{- if or (eq .Values.auth.mode "oauth2") (eq .Values.auth.mode "both") }}
  OPENID_ISSUER: {{ .Values.auth.oauth2.issuer | quote }}
  OPENID_CLIENT_ID: {{ .Values.auth.oauth2.clientId | quote }}
  OPENID_CLIENT_SECRET: {{ (get .Values.secrets.data .Values.auth.oauth2.clientSecretKey) | default "" | quote }}
  OPENID_CALLBACK_URL: {{ .Values.auth.oauth2.callbackURL | quote }}
  OPENID_SCOPE: {{ .Values.auth.oauth2.scope | quote }}
  OPENID_USE_PKCE: {{ .Values.auth.oauth2.usePKCE | quote }}
  OPENID_BUTTON_LABEL: {{ .Values.auth.oauth2.buttonLabel | quote }}
  OPENID_AUTO_REDIRECT: {{ .Values.auth.oauth2.autoRedirect | quote }}
  {{- if .Values.auth.oauth2.requiredRole }}
  OPENID_REQUIRED_ROLE: {{ .Values.auth.oauth2.requiredRole | quote }}
  {{- end }}
  OPENID_SESSION_SECRET: {{ include "argus.secretValue" (list $ "OPENID_SESSION_SECRET" (randAlphaNum 64)) | quote }}
  {{- end }}

  {{- $extraData := .Values.secrets.data }}
  {{- if or (eq .Values.auth.mode "oauth2") (eq .Values.auth.mode "both") }}
  {{- $extraData = omit $extraData .Values.auth.oauth2.clientSecretKey }}
  {{- end }}
  {{- if and .Values.vllmService.enabled .Values.vllmService.registerAsLlmEndpoint }}
  {{/* "EMPTY" is vLLM's own OpenAI-client convention placeholder for "no
  server-side auth configured" -- not a real secret. User-supplied
  secrets.data still wins if the same key is already set there. */}}
  {{- $extraData = merge $extraData (dict .Values.vllmService.apiKeySecretKey "EMPTY") }}
  {{- end }}
  {{- range $key, $value := $extraData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
