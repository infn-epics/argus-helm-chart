{{- if and .Values.argusMcp.enabled .Values.argusMcp.backends.documentation.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "argus.mcp.fullname" . }}-docs
  namespace: {{ include "argus.mcp.namespace" . }}
  labels:
    {{- include "argus.mcp.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.argusMcp.backends.documentation.persistence.accessMode }}
  {{- if .Values.argusMcp.backends.documentation.persistence.storageClassName }}
  storageClassName: {{ .Values.argusMcp.backends.documentation.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.argusMcp.backends.documentation.persistence.size }}
{{- end }}
