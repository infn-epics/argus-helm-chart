{{/*
Non-secret ARGUS backend env vars — maps 1:1 onto argus-mcp-server's own
.env.example. Sensitive counterparts (passwords/tokens/API keys) are
referenced by the Deployment directly from the shared credentials Secret,
never placed here.
*/}}
{{- if .Values.argusMcp.enabled }}
{{- $b := .Values.argusMcp.backends }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argus.mcp.fullname" . }}-env
  namespace: {{ include "argus.mcp.namespace" . }}
  labels:
    {{- include "argus.mcp.labels" . | nindent 4 }}
data:
  ARGUS_TRANSPORT: {{ .Values.argusMcp.transport | quote }}
  ARGUS_SSE_HOST: "0.0.0.0"
  ARGUS_SSE_PORT: {{ .Values.argusMcp.service.port | quote }}
  ARGUS_LOG_LEVEL: {{ .Values.argusMcp.logging.level | quote }}
  ARGUS_LOG_JSON: {{ .Values.argusMcp.logging.json | quote }}

  {{/*
  Outbound HTTP proxy for external calls (RAGFLOW, GitHub, GitLab). In an
  epik8s deployment these come pre-populated from epicsConfiguration's
  http_proxy/https_proxy/no_proxy -- epik8s-chart's services.yaml injects
  them into every service Application's values automatically (see
  epik8s-chart/templates/services.yaml). httpx (used by every ARGUS REST
  provider) honors these env vars itself via trust_env, so no code changes
  are needed here -- just plumbing the values through.
  */}}
  {{- if .Values.http_proxy }}
  HTTP_PROXY: {{ .Values.http_proxy | quote }}
  {{- end }}
  {{- if .Values.https_proxy }}
  HTTPS_PROXY: {{ .Values.https_proxy | quote }}
  {{- end }}
  {{- if .Values.no_proxy }}
  NO_PROXY: {{ .Values.no_proxy | quote }}
  {{- end }}

  {{- if $b.epics.caAddrList }}
  EPICS_CA_ADDR_LIST: {{ $b.epics.caAddrList | quote }}
  {{- end }}
  EPICS_CA_AUTO_ADDR_LIST: {{ $b.epics.caAutoAddrList | quote }}
  {{- if $b.epics.pvaAddrList }}
  EPICS_PVA_ADDR_LIST: {{ $b.epics.pvaAddrList | quote }}
  {{- end }}

  {{- if $b.archiver.baseUrl }}
  ARCHIVER_BASE_URL: {{ $b.archiver.baseUrl | quote }}
  {{- end }}

  {{- if $b.channelfinder.baseUrl }}
  CHANNELFINDER_BASE_URL: {{ $b.channelfinder.baseUrl | quote }}
  {{- end }}
  {{- if $b.channelfinder.username }}
  CHANNELFINDER_USERNAME: {{ $b.channelfinder.username | quote }}
  {{- end }}

  K8S_NAMESPACE_DEFAULT: {{ include "argus.mcp.watchedNamespace" . | quote }}
  K8S_IOC_LABEL_SELECTOR_TEMPLATE: {{ $b.kubernetes.iocLabelSelectorTemplate | quote }}

  {{- if $b.argocd.serverUrl }}
  ARGOCD_SERVER_URL: {{ $b.argocd.serverUrl | quote }}
  {{- end }}

  {{- if $b.saverestore.baseUrl }}
  SAVERESTORE_BASE_URL: {{ $b.saverestore.baseUrl | quote }}
  {{- end }}

  {{- if $b.logbook.baseUrl }}
  LOGBOOK_BASE_URL: {{ $b.logbook.baseUrl | quote }}
  {{- end }}
  {{- if $b.logbook.username }}
  LOGBOOK_USERNAME: {{ $b.logbook.username | quote }}
  {{- end }}

  {{- if $b.elastic.url }}
  ELASTIC_URL: {{ $b.elastic.url | quote }}
  {{- end }}
  ELASTIC_DEFAULT_INDEX: {{ $b.elastic.defaultIndex | quote }}

  {{- if $b.loki.baseUrl }}
  LOKI_BASE_URL: {{ $b.loki.baseUrl | quote }}
  {{- end }}
  LOKI_DEFAULT_LIMIT: {{ $b.loki.defaultLimit | quote }}

  DOCUMENTATION_BACKEND: {{ $b.documentation.backend | quote }}
  DOCS_PATH: {{ $b.documentation.docsPath | quote }}
  DOCS_INDEX_PATH: {{ $b.documentation.indexPath | quote }}

  {{- if $b.ragflow.baseUrl }}
  RAGFLOW_BASE_URL: {{ $b.ragflow.baseUrl | quote }}
  {{- end }}
  {{- if $b.ragflow.datasetIds }}
  RAGFLOW_DATASET_IDS: {{ $b.ragflow.datasetIds | quote }}
  {{- end }}
  {{/*
  Default dataset names to the shared "Controlli" KB plus this beamline's
  own dataset (once one exists with that name) -- same auto-derivation
  pattern as GITLAB_BASE_URL/GIT_DEFAULT_REPOS below, driven by
  .Values.beamline (auto-injected by epik8s-chart). Explicit
  backends.ragflow.datasetNames always wins.
  */}}
  {{- $datasetNames := $b.ragflow.datasetNames }}
  {{- if and (not $datasetNames) .Values.beamline }}
  {{- $datasetNames = printf "Controlli,%s" .Values.beamline }}
  {{- end }}
  {{- if $datasetNames }}
  RAGFLOW_DATASET_NAMES: {{ $datasetNames | quote }}
  {{- end }}
  {{- if $b.ragflow.timeoutSeconds }}
  RAGFLOW_TIMEOUT_SECONDS: {{ $b.ragflow.timeoutSeconds | quote }}
  {{- end }}

  {{- if $b.git.github.baseUrl }}
  GITHUB_BASE_URL: {{ $b.git.github.baseUrl | quote }}
  {{- end }}

  {{/*
  In an epik8s deployment, .Values.giturl is the beamline's own deploy repo
  (e.g. https://baltig.infn.it/lnf-da-control/epik8s-btf.git) -- epik8s-chart's
  services.yaml injects it (with gitrev) into every service Application's
  values automatically, same mechanism as http_proxy above. Auto-derive
  GitLab's base URL and a default search repo from it so beamlines don't
  have to hand-configure backends.git.gitlab/defaultRepos just to point
  ARGUS at their own config repo -- explicit values here still win.
  */}}
  {{- $gitlabBaseUrl := $b.git.gitlab.baseUrl }}
  {{- $giturlHost := "" }}
  {{- if .Values.giturl }}
  {{- $giturlHost = (urlParse .Values.giturl).host }}
  {{- end }}
  {{- if and (not $gitlabBaseUrl) .Values.giturl (ne $giturlHost "github.com") }}
  {{- $gitlabBaseUrl = printf "%s://%s" (urlParse .Values.giturl).scheme $giturlHost }}
  {{- end }}
  {{- if $gitlabBaseUrl }}
  GITLAB_BASE_URL: {{ $gitlabBaseUrl | quote }}
  {{- end }}

  {{- $defaultRepos := $b.git.defaultRepos }}
  {{- if and (not $defaultRepos) .Values.giturl }}
  {{- $defaultRepos = list .Values.giturl }}
  {{- end }}
  {{- if $defaultRepos }}
  GIT_DEFAULT_REPOS: {{ join "," $defaultRepos | quote }}
  {{- end }}

  CACHE_DEVICE_TTL_SECONDS: {{ $b.cache.deviceTtlSeconds | quote }}
  CACHE_CHANNELFINDER_TTL_SECONDS: {{ $b.cache.channelfinderTtlSeconds | quote }}
  CACHE_KUBERNETES_TTL_SECONDS: {{ $b.cache.kubernetesTtlSeconds | quote }}
  CACHE_KNOWLEDGE_TTL_SECONDS: {{ $b.cache.knowledgeTtlSeconds | quote }}
{{- end }}
