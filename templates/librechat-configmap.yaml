{{/*
Renders the full librechat.yaml, composed from this chart's typed values
(llm.endpoints, mcpServers, argusMcp) rather than requiring operators to
hand-write the upstream chart's raw `configYamlContent` string. Wired into
the librechat subchart via `librechat.librechat.existingConfigYaml`
(fixed name — see values.yaml's top-of-file note on why).

API keys and other secrets are NEVER inlined here — every sensitive value
is referenced as `${VAR_NAME}`, resolved by LibreChat's own process from
the env vars supplied by templates/librechat-secret.yaml.
*/}}
{{- if .Values.librechat.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.resourceNames.configYaml }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
data:
  librechat.yaml: |
    version: "1.3.11"
    cache: true

    {{- if ne .Values.auth.mode "basic" }}
    registration:
      socialLogins: ["openid"]
    {{- end }}

    {{- $llmEndpoints := .Values.llm.endpoints }}
    {{- if and .Values.vllmService.enabled .Values.vllmService.registerAsLlmEndpoint }}
    {{- $vllmEndpoint := dict "name" .Values.vllmService.llmEndpointName "apiKeySecretKey" .Values.vllmService.apiKeySecretKey "baseURL" (include "argus.vllm.baseUrl" .) "modelDisplayLabel" .Values.vllmService.llmEndpointName "models" (dict "default" (list .Values.vllmService.servedModelName) "fetch" false) }}
    {{- $llmEndpoints = append $llmEndpoints $vllmEndpoint }}
    {{- end }}
    endpoints:
      custom:
        {{- range $llmEndpoints }}
        - name: {{ .name | quote }}
          {{- if .provider }}
          provider: {{ .provider | quote }}
          {{- end }}
          apiKey: {{ printf "${%s}" .apiKeySecretKey | quote }}
          baseURL: {{ .baseURL | quote }}
          models:
            default:
              {{- range .models.default }}
              - {{ . | quote }}
              {{- end }}
            fetch: {{ .models.fetch | default false }}
          {{- if hasKey . "titleConvo" }}
          titleConvo: {{ .titleConvo }}
          {{- end }}
          {{- if .titleModel }}
          titleModel: {{ .titleModel | quote }}
          {{- end }}
          {{- if .modelDisplayLabel }}
          modelDisplayLabel: {{ .modelDisplayLabel | quote }}
          {{- end }}
          {{- if .iconURL }}
          iconURL: {{ .iconURL | quote }}
          {{- end }}
          {{- if .headers }}
          headers:
            {{- range $key, $value := .headers }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
          {{- end }}
        {{- end }}

    mcpServers:
      {{- if .Values.argusMcp.enabled }}
      argus:
        type: {{ .Values.argusMcp.transport | quote }}
        url: {{ printf "http://%s.%s.svc.cluster.local:%v/sse" (include "argus.mcp.fullname" .) (include "argus.mcp.namespace" .) .Values.argusMcp.service.port | quote }}
        chatMenu: true
        title: "ARGUS"
        description: "Accelerator control-room operations: PVs, devices, diagnostics, IOCs, history, documentation."
        {{/*
        Freshly resolved before every individual tool call (not just once per
        SSE connection) per LibreChat's own docs -- lets argus-mcp-server tie
        its own tool-call logs (see argus/mcp_server/server.py's
        request_context header extraction) back to the exact LibreChat
        conversation/message/user that triggered them. See
        epik8s-platform's README.md "Observability: Langfuse" for how this
        feeds Loki-side debugging.
        */}}
        headers:
          X-Librechat-Conversation-Id: "{{"{{"}}LIBRECHAT_BODY_CONVERSATIONID{{"}}"}}"
          X-Librechat-Message-Id: "{{"{{"}}LIBRECHAT_BODY_MESSAGEID{{"}}"}}"
          X-Librechat-User-Id: "{{"{{"}}LIBRECHAT_USER_ID{{"}}"}}"
      {{- end }}
      {{- range $name, $server := .Values.mcpServers }}
      {{- if $server.enabled }}
      {{ $name }}:
        {{- omit $server "enabled" | toYaml | nindent 8 }}
      {{- end }}
      {{- end }}

    # LibreChat's SSRF protection blocks MCP connections to any host not
    # explicitly allowed. allowedAddresses (rather than the stricter
    # allowedDomains) only exempts these specific hosts, leaving normal
    # outbound access to everything else untouched. Always includes ARGUS's
    # own in-cluster Service; every additional enabled mcpServers.* entry's
    # host is derived from its url automatically.
    mcpSettings:
      allowedAddresses:
        {{- if .Values.argusMcp.enabled }}
        - {{ printf "%s.%s.svc.cluster.local:%v" (include "argus.mcp.fullname" .) (include "argus.mcp.namespace" .) .Values.argusMcp.service.port | quote }}
        {{- end }}
        {{- range $name, $server := .Values.mcpServers }}
        {{- if and $server.enabled $server.url }}
        {{- $parsed := urlParse $server.url }}
        {{- $host := $parsed.host }}
        {{- if not (contains ":" $host) }}
        {{- $host = printf "%s:%s" $host (ternary "443" "80" (eq $parsed.scheme "https")) }}
        {{- end }}
        - {{ $host | quote }}
        {{- end }}
        {{- end }}
{{- end }}
