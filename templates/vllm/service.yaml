{{- if .Values.vllmService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argus.vllm.fullname" . }}
  namespace: {{ include "argus.vllm.namespace" . }}
  labels:
    {{- include "argus.vllm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.vllmService.service.port }}
      targetPort: {{ .Values.vllmService.service.port }}
      protocol: TCP
  selector:
    {{- include "argus.vllm.selectorLabels" . | nindent 4 }}
{{- end }}
